name: sf_skeleton_app
description: SaveFamily skeleton app entry point
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.10.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  go_router: ^17.0.0
  get_it: ^9.0.5

  design_system:
    path: ../../packages/design_system
